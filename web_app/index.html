<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Engine | Infinite Stream</title>
  <style>
    :root {
      --bg: #0D0D0D;
      --accent: #FF6B00;
      --fg: #f7f7f7;
      --muted: #7e7e7e;
      --panel: #141414;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(960px, 100%);
      border: 2px solid var(--accent);
      background: var(--panel);
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-size: clamp(1.8rem, 2.8vw, 2.6rem);
    }

    .sub {
      margin: 0 0 24px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.78rem;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .vibe-btn {
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--fg);
      padding: 28px 16px;
      min-height: 140px;
      text-transform: uppercase;
      font-weight: 900;
      font-size: clamp(1rem, 2vw, 1.4rem);
      letter-spacing: 0.06em;
      cursor: pointer;
    }

    .vibe-btn.active {
      background: var(--accent);
      color: #000;
    }

    .vibe-btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    #status {
      min-height: 1.2em;
      margin-bottom: 16px;
      color: var(--accent);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    audio {
      width: 100%;
      border-top: 1px solid #2d2d2d;
      padding-top: 12px;
    }

    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
      .vibe-btn { min-height: 96px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Void Engine</h1>
    <p class="sub">Infinite AI-free state radio</p>

    <section class="grid" id="vibeGrid">
      <button class="vibe-btn" data-vibe="God Complex">God Complex</button>
      <button class="vibe-btn" data-vibe="Spite">Pure Spite</button>
      <button class="vibe-btn" data-vibe="Discipline">Cold Discipline</button>
    </section>

    <div id="status">Select a state to begin.</div>
    <audio id="audioPlayer" controls autoplay></audio>
  </main>

  <script>
    const state = {
      activeVibe: null,
      loading: false,
    };

    const buttons = Array.from(document.querySelectorAll('.vibe-btn'));
    const statusNode = document.getElementById('status');
    const player = document.getElementById('audioPlayer');
    let prebuffer = null;

    function setLoading(isLoading) {
      state.loading = isLoading;
      buttons.forEach(btn => {
        btn.disabled = isLoading;
      });
    }

    function setActiveButton(vibe) {
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.vibe === vibe);
      });
    }

    async function requestTrack(vibe) {
      const response = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vibe }),
      });

      const data = await response.json();
      if (!response.ok || data.error || !data.url) {
        throw new Error(data.error || 'stream generation failed');
      }

      return data;
    }

    async function prebufferNext(vibe) {
      try {
        const data = await requestTrack(vibe);
        prebuffer = {
          vibe,
          seed: data.seed || 'matrix seed',
          url: `${data.url}${data.url.includes('?') ? '&' : '?'}t=${Date.now()}`,
        };
      } catch (error) {
        prebuffer = null;
        console.error('prebuffer failed', error);
      }
    }

    async function fetchAndPlay(vibe, usePrebuffer = true) {
      if (!vibe || state.loading) return;

      setLoading(true);
      statusNode.textContent = `[${vibe}] acquiring next track...`;

      try {
        let track;
        if (usePrebuffer && prebuffer && prebuffer.vibe === vibe) {
          track = prebuffer;
          prebuffer = null;
        } else {
          const data = await requestTrack(vibe);
          track = {
            vibe,
            seed: data.seed || 'matrix seed',
            url: `${data.url}${data.url.includes('?') ? '&' : '?'}t=${Date.now()}`,
          };
        }

        state.activeVibe = vibe;
        setActiveButton(vibe);

        player.src = track.url;
        player.load();
        await player.play();
        statusNode.textContent = `[${vibe}] live → ${track.seed}`;

        void prebufferNext(vibe);
      } catch (error) {
        statusNode.textContent = `stream error: ${error.message}`;
      } finally {
        setLoading(false);
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        fetchAndPlay(btn.dataset.vibe);
      });
    });

    player.addEventListener('ended', () => {
      if (!state.activeVibe) return;
      fetchAndPlay(state.activeVibe);
    });
  </script>
</body>
</html>
